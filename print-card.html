<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Печатная QR-карточка | Отель Звездный</title>
    <link rel="icon" href="https://zvezdny.biz/favicon.ico">
    <style>
      :root {
        --green: #08393d;
        --green-soft: #e7f0ef;
        --gold: #b9945b;
        --paper: #fffaf3;
        --text: #10292c;
        --muted: #5d6f72;
        --line: #d8e2df;
      }

      * {
        box-sizing: border-box;
      }

      @page {
        size: A6;
        margin: 0;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #ebe5dc;
        color: var(--text);
        font-family: "Noto Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .sheet {
        width: 105mm;
        min-height: 148mm;
        display: grid;
        padding: 10mm;
        background:
          linear-gradient(180deg, rgba(255, 250, 243, 0.95), rgba(255, 250, 243, 0.98)),
          var(--paper);
        border: 1px solid var(--line);
      }

      .card {
        display: grid;
        align-content: space-between;
        min-height: 128mm;
        padding: 8mm;
        border: 1px solid var(--line);
        border-radius: 4mm;
        background: #fff;
        text-align: center;
      }

      .logo {
        width: 40mm;
        height: auto;
        margin: 0 auto 9mm;
      }

      .eyebrow {
        margin: 0 0 3mm;
        color: var(--gold);
        font-size: 8pt;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: var(--green);
        font-size: 20pt;
        line-height: 1.08;
      }

      .subtitle {
        margin: 4mm 0 0;
        color: var(--muted);
        font-size: 9.5pt;
        line-height: 1.38;
      }

      .qr-wrap {
        width: 54mm;
        height: 54mm;
        display: grid;
        place-items: center;
        margin: 8mm auto 5mm;
        padding: 3mm;
        border: 1px solid var(--line);
        border-radius: 3mm;
        background: #fff;
      }

      .qr {
        width: 100%;
        height: 100%;
      }

      .steps {
        display: grid;
        gap: 2mm;
        margin: 0;
        padding: 0;
        list-style: none;
        color: var(--green);
        font-size: 9pt;
        font-weight: 700;
      }

      .url {
        margin: 6mm 0 0;
        padding-top: 4mm;
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 7.5pt;
        word-break: break-all;
      }

      @media screen {
        body {
          padding: 24px;
        }

        .sheet {
          box-shadow: 0 22px 60px rgba(8, 57, 61, 0.16);
        }
      }

      @media print {
        body {
          display: block;
          background: #fff;
        }

        .sheet {
          border: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="sheet">
      <section class="card">
        <div>
          <img class="logo" src="assets/zvezdny-logo.svg" alt="Отель Звездный">
          <p class="eyebrow">Цифровой гид гостя</p>
          <h1>Цифровой гид гостя</h1>
          <p class="subtitle">Wi-Fi, завтрак, уборка, обслуживание номеров, СПА, правила проживания и обратная связь в одном месте.</p>
        </div>

        <div>
          <div class="qr-wrap">
            <img class="qr" src="assets/qr-guestbook.svg" alt="QR-код для открытия цифрового гида">
          </div>
          <ul class="steps">
            <li>1. Отсканируйте QR-код</li>
            <li>2. Введите номер комнаты</li>
            <li>3. Откройте нужный раздел</li>
          </ul>
        </div>

        <p class="url">https://lllovespr1ng-dot.github.io/zvezdny-guestbook/index.html</p>
      </section>
    </main>
  </body>
</html>
