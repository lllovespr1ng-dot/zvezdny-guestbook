<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Печатная QR-карточка | Отель Звездный</title>
    <link rel="icon" href="https://zvezdny.biz/favicon.ico">
    <style>
      :root {
        --green: #12362f;
        --green-soft: #edf1e7;
        --gold: #b49a62;
        --paper: #fffdf7;
        --text: #142f2b;
        --muted: #5d6f72;
        --line: #d4d0bf;
        --line-strong: #b8ad86;
      }

      * {
        box-sizing: border-box;
      }

      @page {
        size: A6;
        margin: 0;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(180, 154, 98, 0.14), transparent 34%),
          #ebe5dc;
        color: var(--text);
        font-family: "Inter", "Noto Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .sheet {
        width: 105mm;
        min-height: 148mm;
        display: grid;
        padding: 8mm;
        background: var(--paper);
        border: 1px solid var(--line-strong);
      }

      .card {
        display: grid;
        align-content: space-between;
        min-height: 132mm;
        padding: 9mm 8mm;
        border: 1px solid rgba(180, 154, 98, 0.48);
        border-radius: 3mm;
        background: #fffdf8;
        text-align: center;
        box-shadow: inset 0 0 0 1.5mm rgba(255, 255, 255, 0.62);
      }

      .logo {
        width: 34mm;
        height: auto;
        margin: 0 auto 8mm;
        filter: brightness(0) saturate(100%) invert(17%) sepia(18%) saturate(1052%) hue-rotate(124deg) brightness(92%) contrast(91%);
      }

      .eyebrow {
        margin: 0 0 3mm;
        color: var(--gold);
        font-size: 8pt;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: var(--green);
        font-size: 26pt;
        line-height: 0.94;
        letter-spacing: -0.04em;
        text-transform: uppercase;
      }

      .subtitle {
        margin: 5mm auto 0;
        max-width: 76mm;
        color: #1d2f2b;
        font-size: 9.5pt;
        line-height: 1.3;
      }

      .qr-wrap {
        width: 56mm;
        height: 56mm;
        display: grid;
        place-items: center;
        margin: 8mm auto 5mm;
        padding: 3mm;
        border: 1px solid rgba(180, 154, 98, 0.5);
        border-radius: 3mm;
        background: #fffdf8;
      }

      .qr {
        width: 100%;
        height: 100%;
      }

      .steps {
        display: grid;
        gap: 2.2mm;
        margin: 0;
        padding: 0;
        list-style: none;
        color: var(--green);
        font-size: 9.5pt;
        font-weight: 700;
      }

      .url {
        margin: 5mm 0 0;
        padding-top: 4mm;
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 7.5pt;
        word-break: break-all;
      }

      @media screen {
        body {
          padding: 24px;
        }

        .sheet {
          box-shadow: 0 22px 60px rgba(8, 57, 61, 0.16);
        }
      }

      @media print {
        body {
          display: block;
          background: #fff;
        }

        .sheet {
          border: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="sheet">
      <section class="card">
        <div>
          <img class="logo" src="assets/zvezdny-logo.svg" alt="Отель Звездный">
          <p class="eyebrow">Цифровой гид гостя</p>
          <h1>Цифровой гид гостя</h1>
          <p class="subtitle">Wi-Fi, завтрак, уборка, обслуживание номеров, СПА, правила проживания и обратная связь в одном месте.</p>
        </div>

        <div>
          <div class="qr-wrap">
            <img class="qr" src="assets/qr-guestbook.svg" alt="QR-код для открытия цифрового гида">
          </div>
          <ul class="steps">
            <li>1. Отсканируйте QR-код</li>
            <li>2. Введите номер комнаты</li>
            <li>3. Откройте нужный раздел</li>
          </ul>
        </div>

        <p class="url">https://lllovespr1ng-dot.github.io/zvezdny-guestbook/index.html</p>
      </section>
    </main>
  </body>
</html>
