<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QR-карточка | Отель Звездный</title>
    <link rel="icon" href="https://zvezdny.biz/favicon.ico">
    <style>
      :root {
        --green: #12362f;
        --gold: #b49a62;
        --paper: #fffdf7;
        --cream: #f4efe4;
        --line: #d4d0bf;
        --line-strong: #b8ad86;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(180, 154, 98, 0.16), transparent 34%),
          linear-gradient(180deg, #f8f3e8 0%, #efe8da 100%);
        color: var(--green);
        font-family: "Inter", "Noto Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .card {
        width: min(92vw, 390px);
        padding: 26px;
        border: 1px solid var(--line-strong);
        border-radius: 14px;
        background: var(--paper);
        text-align: center;
        box-shadow:
          inset 0 0 0 6px rgba(255, 255, 255, 0.68),
          inset 0 0 0 7px rgba(180, 154, 98, 0.28),
          0 24px 60px rgba(18, 54, 47, 0.14);
      }

      .logo {
        width: 128px;
        margin-bottom: 20px;
        filter: brightness(0) saturate(100%) invert(17%) sepia(18%) saturate(1052%) hue-rotate(124deg) brightness(92%) contrast(91%);
      }

      h1 {
        margin: 0;
        font-size: 35px;
        line-height: 0.96;
        letter-spacing: -0.04em;
        text-transform: uppercase;
      }

      p {
        margin: 14px auto 0;
        max-width: 310px;
        color: #1d2f2b;
        font-size: 15px;
        line-height: 1.32;
      }

      .qr {
        display: grid;
        width: 210px;
        height: 210px;
        place-items: center;
        margin: 26px auto 20px;
        border: 9px solid #fffdf8;
        border-radius: 10px;
        background: #fff;
        box-shadow:
          inset 0 0 0 1px rgba(180, 154, 98, 0.48),
          0 10px 22px rgba(18, 54, 47, 0.12);
      }

      .qr img {
        display: block;
        width: 100%;
        height: 100%;
      }

      .qr-fallback {
        display: block;
        padding: 8px;
        background: #fff;
        color: var(--green);
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .qr-fallback[hidden] {
        display: none;
      }

      .url {
        margin-top: 18px;
        padding-top: 16px;
        border-top: 1px solid var(--line);
        color: var(--gold);
        font-weight: 800;
        word-break: break-all;
      }

      .note {
        margin-top: 12px;
        padding: 10px;
        border: 1px solid rgba(180, 154, 98, 0.34);
        border-radius: 10px;
        background: #fbf8ee;
        color: #65736f;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img class="logo" src="https://zvezdny.biz/upload/images/ZV_logo.svg" alt="Отель Звездный">
      <h1>Цифровой гид гостя</h1>
      <p>Сканируйте QR-код, введите номер комнаты и откройте Wi-Fi, завтрак, услуги, СПА и контакты службы приема и размещения.</p>
      <div class="qr" aria-label="Место для QR-кода">
        <img id="qrImage" alt="QR-код для открытия цифрового гида">
        <span class="qr-fallback" id="qrFallback">QR-код</span>
      </div>
      <p class="url" id="qrUrl">zvezdny-guestbook/index.html</p>
      <p class="note" id="qrNote"></p>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const guestbookUrl = params.get("url") || new URL("index.html", window.location.href).href;
      const qrImage = document.querySelector("#qrImage");
      const qrFallback = document.querySelector("#qrFallback");
      const qrUrl = document.querySelector("#qrUrl");
      const qrNote = document.querySelector("#qrNote");

      qrUrl.textContent = guestbookUrl;
      qrImage.src = "https://api.qrserver.com/v1/create-qr-code/?size=420x420&margin=16&data=" + encodeURIComponent(guestbookUrl);
      qrImage.addEventListener("load", () => {
        qrFallback.hidden = true;
      });

      if (window.location.protocol === "file:" && !params.get("url")) {
        qrNote.textContent = "Сейчас QR ведет на локальный file:// адрес. Для печати сначала опубликуйте цифровой гид и откройте qr-card.html?url=ВАША_ПУБЛИЧНАЯ_ССЫЛКА.";
      } else {
        qrNote.textContent = "Этот QR ведет на общий цифровой гид. Номер комнаты гость вводит после сканирования.";
      }
    </script>
  </body>
</html>
